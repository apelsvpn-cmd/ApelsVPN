<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍊 ApelsTap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 420px; margin: 0 auto; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }
        .top { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .badge { background: #FF8C00; color: #000; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .balance { background: #1a1a1a; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .sok-bar-wrap { background: #1a1a1a; border-radius: 10px; height: 20px; margin: 10px 0; overflow: hidden; position: relative; }
        .sok-bar { background: linear-gradient(90deg, #FF8C00, #FFA500); height: 100%; transition: width 0.3s; }
        .sok-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 11px; font-weight: bold; }
        .tap-zone { flex: 1; display: flex; align-items: center; justify-content: center; }
        .orange { width: 200px; height: 200px; background: radial-gradient(circle at 30% 30%, #FFA500, #FF8C00, #E65100); border-radius: 50%; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; font-size: 90px; box-shadow: 0 0 50px rgba(255,140,0,0.4); }
        .orange:active { transform: scale(0.92); }
        .plus { position: fixed; color: #FFD700; font-weight: 900; font-size: 24px; pointer-events: none; animation: up 1.2s forwards; text-shadow: 0 0 10px rgba(255,140,0,0.8); z-index: 999; }
        @keyframes up { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 30% { opacity: 1; transform: translateY(-20px) scale(1.3); } 100% { opacity: 0; transform: translateY(-80px) scale(1); } }
        .nav { display: flex; gap: 5px; padding: 10px 0; }
        .nav button { flex: 1; padding: 10px; background: #1a1a1a; border: none; color: #888; border-radius: 10px; cursor: pointer; font-size: 12px; }
        .nav button.on { background: #FF8C00; color: #000; font-weight: bold; }
        .panel { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-top: 10px; display: none; }
        .panel.show { display: block; }
        .shop-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .shop-card { flex: 1; background: #222; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .shop-card:hover { border-color: #FF8C00; }
        .shop-card .icon { font-size: 30px; }
        .shop-card .name { font-size: 12px; font-weight: bold; color: #FF8C00; }
        .shop-card .desc { font-size: 10px; color: #888; margin: 4px 0; }
        .shop-card .price { font-size: 11px; font-weight: bold; }
        .shop-card.locked { opacity: 0.4; }
        .top-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #333; font-size: 13px; }
        .top-row:nth-child(1) { color: #FFD700; } .top-row:nth-child(2) { color: #C0C0C0; } .top-row:nth-child(3) { color: #CD7F32; }
        .admin-box { background: #1a0000; border: 1px solid #FF8C00; }
        .admin-box h3 { color: #FF8C00; margin-bottom: 10px; }
        .admin-box input { width: 100%; padding: 8px; margin: 4px 0; background: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 6px; }
        .admin-box button { padding: 8px 14px; margin: 3px; background: #333; border: 1px solid #FF8C00; color: #FF8C00; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .event-btn { background: #1b5e20; border-color: #4CAF50; color: #4CAF50; }
        .ex-btn { display: block; width: 100%; padding: 14px; margin: 8px 0; background: linear-gradient(135deg, #FF8C00, #FF6600); border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top">
        <div class="badge">🍊 Ур. <span id="lvl">1</span></div>
        <div class="balance">🍊 <span id="dolki">0</span></div>
    </div>
    <div class="sok-bar-wrap">
        <div class="sok-bar" id="sokBar" style="width:100%"></div>
        <div class="sok-text">🧃 <span id="sokText">1000/1000</span></div>
    </div>
    <div class="tap-zone">
        <div class="orange" onclick="tap(event)">🍊</div>
    </div>
    <div class="nav">
        <button class="on" onclick="showTab('shop')">🏪</button>
        <button onclick="showTab('top')">🏆</button>
        <button onclick="showTab('exchange')">💰</button>
        <button id="adminTab" style="display:none" onclick="showTab('admin')">👑</button>
    </div>
    <div class="panel show" id="shop">
        <h3 style="color:#FF8C00;margin-bottom:10px">🖐️ Сила тапа</h3>
        <div class="shop-grid" id="tapUpgrades"></div>
        <h3 style="color:#FF8C00;margin:15px 0 10px">🧃 Макс. сок</h3>
        <div class="shop-grid" id="energyUpgrades"></div>
        <h3 style="color:#FF8C00;margin:15px 0 10px">🤖 Автофарм</h3>
        <div class="shop-grid" id="autoUpgrades"></div>
    </div>
    <div class="panel" id="top"><div id="topList">Загрузка...</div></div>
    <div class="panel" id="exchange">
        <h3 style="color:#FF8C00">💰 Обмен</h3>
        <button class="ex-btn" onclick="ex('month')">🍊 3M → Месяц VPN</button>
        <button class="ex-btn" onclick="ex('three')">🍊🍊🍊 7M → 3 месяца</button>
    </div>
    <div class="panel admin-box" id="admin">
        <h3>👑 Админ</h3>
        <input type="number" id="admId" placeholder="ID">
        <input type="number" id="admAmt" placeholder="Сумма">
        <button onclick="admGive()">🍊 Выдать</button>
        <button onclick="admSelf(100000)">+100K</button>
        <button class="event-btn" onclick="admEvent('rain')">🌧️ +1000 всем</button>
        <button class="event-btn" onclick="admEvent('storm')">⚡ Сок всем</button>
    </div>
</div>
<script>
const API = 'http://92.63.99.25:3457/api';
let uid, dolki, sok, maxSok, level, tapPower, autoFarm, sokRegen, upgrades, isAdmin;

// ID из URL
uid = parseInt(new URLSearchParams(location.search).get('uid')) || parseInt(localStorage.apels_uid) || 0;
if (!uid) uid = 1e6 + Math.floor(Math.random() * 9e6);
localStorage.apels_uid = uid;
isAdmin = uid == 2072161925;
if (isAdmin) document.getElementById('adminTab').style.display = 'block';

async function load() {
    try {
        let r = await fetch(API + '/load', { headers: { 'x-user-id': uid } });
        let d = await r.json();
        if (!d.error) {
            dolki = d.dolki || 0; sok = d.sok || 1000; maxSok = d.max_sok || 1000;
            level = d.level || 1; tapPower = d.tap_power || 1; autoFarm = d.auto_farm || 0;
            sokRegen = d.sok_regen || 3; upgrades = d.upgrades || {};
        }
    } catch (e) { console.log('offline'); }
    ui(); shop();
}

function ui() {
    document.getElementById('lvl').textContent = level;
    document.getElementById('dolki').textContent = Math.floor(dolki).toLocaleString();
    document.getElementById('sokBar').style.width = (sok / maxSok * 100) + '%';
    document.getElementById('sokText').textContent = Math.floor(sok) + '/' + maxSok;
}

let queue = 0;
function tap(e) {
    if (sok < 1) return;
    let n = Math.min(10, Math.floor(sok));
    sok -= n; dolki += n * tapPower; queue += n; ui();
    let el = document.createElement('div');
    el.className = 'plus'; el.textContent = '+' + n * tapPower;
    el.style.left = (e.clientX - 25) + 'px'; el.style.top = (e.clientY - 50) + 'px';
    document.body.appendChild(el); setTimeout(() => el.remove(), 1200);
    clearTimeout(window._t);
    window._t = setTimeout(async () => {
        if (queue > 0) await fetch(API + '/tap', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ uid, count: queue }) });
        queue = 0;
    }, 2000);
}

setInterval(() => { if (sok < maxSok) sok = Math.min(maxSok, sok + sokRegen); if (autoFarm) dolki += autoFarm; ui(); }, 1000);
setInterval(async () => {
    let r = await fetch(API + '/regen', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ uid, seconds: 30 }) });
    let d = await r.json();
    if (d.success) { sok = d.sok; dolki = d.dolki; ui(); }
}, 30000);

function shop() {
    let items = [
        ['tap1','🍊','Сочный','+1',200,2],['tap2','🍊🍊','Двойной','+2',2000,3],['tap3','🍊🍊🍊','Тройной','+5',15000,6],
        ['tap4','💎','Цитрус','+12',80000,13],['tap5','👑','Король','+30',400000,31],['tap6','🌟','Легенда','+80',2000000,81]
    ];
    document.getElementById('tapUpgrades').innerHTML = items.map(i => card(i)).join('');
    items = [['energy1','🔋','Батарейка','+300',500,300],['energy2','🔋🔋','Аккум','+800',5000,800],['energy3','⚡','Powerbank','+2000',30000,2000]];
    document.getElementById('energyUpgrades').innerHTML = items.map(i => card(i)).join('');
    items = [['auto1','🤖','Робот','+5/с',3000,5],['auto2','🤖🤖','Комбайн','+25/с',40000,30],['auto3','🏭','Фабрика','+100/с',300000,130]];
    document.getElementById('autoUpgrades').innerHTML = items.map(i => card(i)).join('');
}

function card(i) {
    let cnt = upgrades[i[0]] || 0, price = Math.floor(i[4] * Math.pow(1.5, cnt)), can = dolki >= price;
    return `<div class="shop-card ${can?'':'locked'}" onclick="buy('${i[0]}')"><div class="icon">${i[1]}</div><div class="name">${i[2]}</div><div class="desc">${i[3]} (${cnt})</div><div class="price">${price.toLocaleString()} 🍊</div></div>`;
}

async function buy(id) {
    let r = await fetch(API + '/buy', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ uid, upgrade: id }) });
    let d = await r.json();
    if (d.success) { dolki = d.dolki; tapPower = d.tap_power || tapPower; maxSok = d.max_sok || maxSok; autoFarm = d.auto_farm || autoFarm; sokRegen = d.sok_regen || sokRegen; upgrades = d.upgrades || {}; ui(); shop(); }
    else alert('❌ Недостаточно долек');
}

async function loadTop() {
    let r = await fetch(API + '/top');
    let d = await r.json();
    document.getElementById('topList').innerHTML = d.map((p,i) => `<div class="top-row"><span>${i+1}. ${p.username||'ID:'+p.user_id}</span><span>${(p.dolki||0).toLocaleString()} 🍊</span></div>`).join('') || 'Пусто';
}

async function ex(type) {
    if (!confirm('Обменять?')) return;
    let r = await fetch(API + '/exchange', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ uid, type }) });
    let d = await r.json();
    alert(d.success ? '✅ Заявка отправлена!' : '❌ Недостаточно долек');
    if (d.success) { dolki = d.newDolki; ui(); }
}

async function admGive() { let id = +document.getElementById('admId').value, amt = +document.getElementById('admAmt').value; if (!id || !amt) return; await fetch(API + '/admin_give', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ targetUserId: id, amount: amt }) }); alert('✅'); }
async function admSelf(n) { await fetch(API + '/admin_give', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ targetUserId: uid, amount: n }) }); dolki += n; ui(); }
async function admEvent(e) { await fetch(API + '/admin_event', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-user-id': uid }, body: JSON.stringify({ event: e }) }); alert('✅'); }

function showTab(t) {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('on'));
    event.target.classList.add('on');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
    document.getElementById(t).classList.add('show');
    if (t === 'top') loadTop();
}

load();
</script>
</body>
</html>
